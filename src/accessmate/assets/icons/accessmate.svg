<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E74C7"/>
      <stop offset="1" stop-color="#123E7A"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#04122b" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="8" y="8" width="240" height="240" rx="58" fill="url(#bg)"/>

  <!-- Focus / target ring – the app helps you find and centre the cursor -->
  <circle cx="120" cy="120" r="78" fill="none" stroke="#F5901E"
          stroke-width="16" stroke-linecap="round"
          stroke-dasharray="360 78" transform="rotate(-58 120 120)"/>

  <!-- Cursor pointer -->
  <g filter="url(#sh)">
    <path fill="#FFFFFF" stroke="#123E7A" stroke-width="6"
          stroke-linejoin="round"
          d="M112 96
             L112 196
             L138 170
             L156 208
             L176 199
             L158 162
             L194 160
             Z"/>
  </g>
</svg>
