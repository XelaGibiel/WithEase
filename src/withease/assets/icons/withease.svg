<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E74C7"/>
      <stop offset="1" stop-color="#123E7A"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#04122b" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="8" y="8" width="240" height="240" rx="58" fill="url(#bg)"/>

  <!-- Focus / target ring – centred on the tile (128,128). -->
  <circle cx="128" cy="128" r="78" fill="none" stroke="#F5901E"
          stroke-width="16" stroke-linecap="round"
          stroke-dasharray="360 78" transform="rotate(-58 128 128)"/>

  <!-- Cursor pointer – shifted by the same (+8,+8) so ring and cursor keep
       their original relationship while the whole glyph sits centred. -->
  <g filter="url(#sh)">
    <path fill="#FFFFFF" stroke="#123E7A" stroke-width="6"
          stroke-linejoin="round"
          d="M120 104
             L120 204
             L146 178
             L164 216
             L184 207
             L166 170
             L202 168
             Z"/>
  </g>
</svg>
